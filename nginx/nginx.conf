# LEARN: Rate limiting uses a shared memory zone ("api:10m") keyed by binary client IP.
#        100r/s per IP with burst=200 covers a POS terminal cluster sharing one NAT IP.
#        nodelay means burst requests are served immediately (not queued) up to the burst limit.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # LEARN: limit_req_zone — defined in the http block so all server blocks share one memory zone.
    #        binary_remote_addr uses 4 bytes (IPv4) or 16 bytes (IPv6) vs 7–15 bytes for $remote_addr string.
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # Upstream definitions
    upstream acquiring {
        server acquiring-service:8080;
    }

    upstream webhook {
        server webhook-dispatcher:8085;
    }

    # Default 503 JSON response for upstream failures
    proxy_next_upstream error timeout http_502 http_503 http_504;

    server {
        listen 80;
        server_name _;

        # Apply rate limit to all location blocks
        limit_req zone=api burst=200 nodelay;
        limit_req_status 429;

        # Forward real client IP to backend services
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Payment authorization and QR endpoints → acquiring-service
        location /api/v1/payments {
            proxy_pass http://acquiring;
            proxy_connect_timeout 15s;
            proxy_read_timeout 15s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @service_unavailable;
        }

        # Webhook trigger endpoints → webhook-dispatcher
        location /api/v1/webhooks {
            proxy_pass http://webhook;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @service_unavailable;
        }

        # Health probe endpoint (no rate limit — called by K8s readiness probes)
        location /health {
            limit_req off;
            proxy_pass http://acquiring;
        }

        # 503 JSON error response
        location @service_unavailable {
            default_type application/json;
            return 503 '{"error":"service_unavailable"}';
        }

        # Default — 404 for unknown paths
        location / {
            default_type application/json;
            return 404 '{"error":"not_found"}';
        }
    }
}
