services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: nexswitch
      POSTGRES_USER: nexswitch_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local_dev_password}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexswitch_app -d nexswitch"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-local_dev_password}
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-local_dev_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka
    ports: ["9092:9092"]
    environment:
      # LEARN: KRaft mode — Kafka 3.3+ can run without ZooKeeper; the broker
      #        also acts as controller, storing metadata in its own replicated log.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  localstack:
    image: localstack/localstack:latest
    ports: ["4566:4566"]
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-south-1
      DOCKER_HOST: unix:///var/run/docker.sock

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OpenTelemetry gRPC
    environment:
      SPAN_STORAGE_TYPE: memory
      COLLECTOR_OTLP_ENABLED: "true"

  # ─── Dev Tools ───────────────────────────────────────────────────────────────
  # LEARN: pgAdmin / kafka-ui / RedisInsight run inside the compose network so
  #        they connect to infra via Docker hostnames (postgres:5432, kafka:9092,
  #        redis:6379) — not localhost. Ports are exposed to the host for browser access.

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexswitch.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports: ["5050:80"]
    depends_on: [postgres]

  kafka-ui:
    image: provectus/kafka-ui:latest
    ports: ["8082:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: nexswitch-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    ports: ["5540:5540"]
    depends_on: [redis]

  # ─── Services ────────────────────────────────────────────────────────────────

  mock-upstream:
    build:
      context: .
      dockerfile: services/mock-upstream/Dockerfile
    ports:
      - "8001:8001"   # Mock Visa
      - "8002:8002"   # Mock Mastercard
      - "8003:8003"   # Mock NPCI NFS/RuPay
      - "8004:8004"   # Mock NPCI UPI (REST)
      - "8090:8090"   # Management
    environment:
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  acquiring-service:
    build:
      context: .
      dockerfile: services/acquiring-service/Dockerfile
    ports:
      - "8000:8000"   # ISO 8583 TCP
      - "8080:8080"   # REST (QR, status, management)
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexswitch
      DB_USERNAME: nexswitch_app
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_password}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UPSTREAM_PROVIDER: ${UPSTREAM_PROVIDER:-wiremock}
      HSM_PROVIDER: ${HSM_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-upstream:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  payment-switch:
    build:
      context: .
      dockerfile: services/payment-switch/Dockerfile
    ports: ["8100:8100"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexswitch
      DB_USERNAME: nexswitch_app
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_password}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UPSTREAM_PROVIDER: ${UPSTREAM_PROVIDER:-wiremock}
      HSM_PROVIDER: ${HSM_PROVIDER:-mock}
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      acquiring-service:
        condition: service_healthy

  webhook-dispatcher:
    build:
      context: .
      dockerfile: services/webhook-dispatcher/Dockerfile
    ports: ["8200:8200"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexswitch
      DB_USERNAME: nexswitch_app
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      acquiring-service:
        condition: service_healthy

  merchant-simulator:
    build:
      context: .
      dockerfile: services/merchant-simulator/Dockerfile
    ports: ["9000:9000"]
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on: [webhook-dispatcher]

  settlement-service:
    build:
      context: .
      dockerfile: services/settlement-service/Dockerfile
    ports: ["8300:8300"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexswitch
      DB_USERNAME: nexswitch_app
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      acquiring-service:
        condition: service_healthy

  reconciliation-service:
    build:
      context: .
      dockerfile: services/reconciliation-service/Dockerfile
    ports: ["8400:8400"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexswitch
      DB_USERNAME: nexswitch_app
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      acquiring-service:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports: ["8500:8500"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_PROFILES_ACTIVE: local
    depends_on: [kafka, mailhog]

  chargeback-service:
    build:
      context: .
      dockerfile: services/chargeback-service/Dockerfile
    ports: ["8600:8600"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexswitch
      DB_USERNAME: nexswitch_app
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      acquiring-service:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend-simulator:
    build: frontend/simulator
    ports: ["3000:80"]
    depends_on: [acquiring-service]

  frontend-dashboard:
    build: frontend/dashboard
    ports: ["3001:80"]
    depends_on: [acquiring-service]

  frontend-ops:
    build: frontend/ops
    ports: ["3002:80"]
    depends_on: [acquiring-service, settlement-service, reconciliation-service]

  # ─── QA Platform — DEV / STAGING ONLY, NEVER PRODUCTION ─────────────────────
  # qa-orchestrator fires real ISO 8583 authorization requests, has chaos injection
  # (Kafka down, Postgres slow, circuit breaker trip), and exposes an unauthenticated
  # trigger API. It must never be included in a production deployment manifest.
  # Stress/load testing (sustained TPS, p95 latency) is handled separately by k6 (#144).

  qa-orchestrator:
    build: services/qa-orchestrator
    ports: ["8700:8700"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexswitch
      DB_USERNAME: nexswitch_app
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QA_ISO8583_HOST: acquiring-service
      QA_ISO8583_PORT: 8000
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
      acquiring-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8700/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend-qa-portal:
    build: frontend/qa-portal
    ports: ["3003:3003"]
    environment:
      QA_ORCHESTRATOR_URL: http://qa-orchestrator:8700
    depends_on:
      qa-orchestrator:
        condition: service_healthy

volumes:
  pgdata:
