spring:
  application:
    name: merchant-simulator

  lifecycle:
    timeout-per-shutdown-phase: 30s

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nexswitch}
    username: ${DB_USERNAME:nexswitch_app}
    password: ${DB_PASSWORD:local_dev_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000

  jpa:
    hibernate:
      ddl-auto: none   # acquiring-service owns Flyway
    open-in-view: false

  flyway:
    enabled: false   # acquiring-service owns all schema migrations

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:local_dev_password}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read_committed
      max-poll-records: 100
      properties:
        max.poll.interval.ms: 300000

server:
  port: 9000
  shutdown: graceful

upstream:
  provider: ${UPSTREAM_PROVIDER:wiremock}

hsm:
  provider: ${HSM_PROVIDER:mock}

storage:
  provider: ${STORAGE_PROVIDER:local}

management:
  server:
    port: 9001
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
