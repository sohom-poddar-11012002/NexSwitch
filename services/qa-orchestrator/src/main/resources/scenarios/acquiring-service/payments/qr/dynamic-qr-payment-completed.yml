scenario:
  id: dynamic-qr-payment-completed
  name: "Dynamic QR — NPCI credit notification → COMPLETED"
  description: |
    Full QR payment lifecycle: generate → inject txnRef → simulate NPCI credit → assert COMPLETED.
    txnRef is extracted from the generate response via json_txnRef (RestTestAdapter top-level field extraction).
    Asserts session transitions to COMPLETED and GET /qr/status returns COMPLETED.
    Tests Redis session update, amount validation (BigDecimal.compareTo), and credit idempotency.
  platform: acquiring-service
  project: payments
  feature: qr
  channel: REST

  variables:
    merchant_id: "MERCH0000999"
    terminal_id: "TERM0001"
    amount: "3000.00"
    currency: "INR"
    order_id: "{{$uuid}}"
    npci_txn_id: "NPCI{{$uuid}}"

  steps:
    - type: send
      channel: REST
      operation: "POST /qr/generate"
      payload:
        merchantId: "{{merchant_id}}"
        terminalId: "{{terminal_id}}"
        amount: "{{amount}}"
        currency: "{{currency}}"
        orderId: "{{order_id}}"
      timeout_ms: 15000
      capture_response_as: qr_generate_response

    - type: assert
      expression: "qr_generate_response['status_code'] == '200'"
      description: "generate must return HTTP 200"
      fail_fast: true

    - type: inject_variable
      name: txn_ref
      value: "{{json_txnRef}}"

    - type: send
      channel: REST
      operation: "POST /upi/credit"
      payload:
        npciTxnId: "{{npci_txn_id}}"
        payerVpa: "customer@upi"
        payeeVpa: "merch0000999@payswiff"
        amount: "{{amount}}"
        txnRef: "{{txn_ref}}"
      timeout_ms: 15000
      capture_response_as: credit_response

    - type: assert
      expression: "credit_response['status_code'] == '200'"
      description: "UPI credit must return HTTP 200"
      fail_fast: true

    - type: assert
      expression: "$.response_json.status == 'COMPLETED'"
      description: "credit response must confirm COMPLETED status"

    - type: send
      channel: REST
      operation: "GET /qr/status/{{txn_ref}}"
      timeout_ms: 15000
      capture_response_as: status_response

    - type: assert
      expression: "status_response['status_code'] == '200'"
      description: "status poll must return HTTP 200"

    - type: assert
      expression: "$.response_json.status == 'COMPLETED'"
      description: "session status must be COMPLETED after NPCI credit"
