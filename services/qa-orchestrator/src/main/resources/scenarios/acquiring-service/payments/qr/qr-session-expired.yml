scenario:
  id: qr-session-expired
  name: "Dynamic QR — GET status returns 404 after session expiry"
  description: |
    Attempts to fetch a QR session for a txnRef that does not exist in Redis
    (either never created or already expired/deleted).
    Asserts 404 response — validates that expired sessions are not resurrectable.
    In local dev: use a non-existent txnRef directly.
    On staging: can generate a QR and wait >5 min, then poll.
  platform: acquiring-service
  project: payments
  feature: qr
  channel: REST

  variables:
    nonexistent_txn_ref: "TXN_EXPIRED_99999999"

  steps:
    - type: rest_get
      name: poll_nonexistent
      url: "http://acquiring-service:8080/qr/status/{{nonexistent_txn_ref}}"
      capture_response_as: status_response
      expected_status: 404

    - type: assert
      expression: "status_response['reason'] != null"
      description: "404 response must include a reason explaining the session is not found"
