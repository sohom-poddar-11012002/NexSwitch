scenario:
  id: dynamic-qr-generate-pending
  name: "Dynamic QR — generate session, assert PENDING status"
  description: |
    POST /qr/generate for MERCH0000999 with ₹6,000 order.
    Asserts HTTP 200 with txnRef, qrImageBase64, and expiresAt.
    Polls GET /qr/status/{txnRef} and asserts status=PENDING.
    Tests Redis session creation with correct TTL (5 min).
  platform: acquiring-service
  project: payments
  feature: qr
  channel: REST

  variables:
    merchant_id: "MERCH0000999"
    terminal_id: "TERM0001"
    amount: "6000.00"
    currency: "INR"
    order_id: "{{$uuid}}"

  steps:
    - type: send
      channel: REST
      operation: "POST /qr/generate"
      payload:
        merchantId: "{{merchant_id}}"
        terminalId: "{{terminal_id}}"
        amount: "{{amount}}"
        currency: "{{currency}}"
        orderId: "{{order_id}}"
      timeout_ms: 15000
      capture_response_as: qr_response

    - type: assert
      expression: "qr_response['status_code'] == '200'"
      description: "generate must return HTTP 200"
      fail_fast: true

    - type: assert
      expression: "response_body.contains('txnRef')"
      description: "response must contain txnRef field"

    - type: assert
      expression: "response_body.contains('qrImageBase64')"
      description: "response must contain Base64 QR image"

    - type: assert
      expression: "response_body.contains('expiresAt')"
      description: "response must contain expiresAt timestamp"

    - type: inject_variable
      name: txn_ref
      value: "{{json_txnRef}}"

    - type: send
      channel: REST
      operation: "GET /qr/status/{{txn_ref}}"
      timeout_ms: 15000
      capture_response_as: status_response

    - type: assert
      expression: "status_response['status_code'] == '200'"
      description: "status poll must return HTTP 200"

    - type: assert
      expression: "$.response_json.status == 'PENDING'"
      description: "QR session must be PENDING before payment is made"
