scenario:
  id: wrong-currency
  name: "Unsupported currency rejected"
  description: "Currency code 840 (USD) on an INR-only acquirer. Must be rejected."
  platform: acquiring-service
  project: payments
  feature: boundary
  channel: ISO8583

  variables:
    pan: "4539148803436467"
    amount_paise: "000000100000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "840"    # USD

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "051"
      timeout_ms: 15000
      capture_response_as: auth_response

    - type: assert
      expression: "auth_response['field39'] != '00'"
      description: "USD currency on INR acquirer must be rejected"
      fail_fast: true
