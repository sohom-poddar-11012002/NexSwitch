scenario:
  id: replay-attack
  name: "STAN replay attack"
  description: "Send same STAN twice. First must be approved; second must be rejected with field39=94 (duplicate transmission)."
  platform: acquiring-service
  project: payments
  feature: security
  channel: ISO8583

  variables:
    pan: "4539148803436467"
    amount_paise: "000000100000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"

  steps:
    - type: inject_variable
      name: replay_stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{replay_stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "356"
        pos_entry_mode: "051"
      timeout_ms: 15000
      capture_response_as: first_response

    - type: assert
      expression: "first_response['field39'] == '00'"
      description: "First request must be approved"
      fail_fast: true

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{replay_stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "356"
        pos_entry_mode: "051"
      timeout_ms: 15000
      capture_response_as: replay_response

    - type: assert
      expression: "replay_response['field39'] == '94'"
      description: "Replay must be rejected with field39=94 (duplicate STAN)"
      fail_fast: true
