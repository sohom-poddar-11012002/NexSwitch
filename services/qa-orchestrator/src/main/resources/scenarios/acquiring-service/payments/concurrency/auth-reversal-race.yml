scenario:
  id: auth-reversal-race
  name: "Auth → immediate reversal race"
  description: "Auth approved then reversal sent with same STAN before settlement. Both must complete without data corruption. Reversal must return field39=00."
  platform: acquiring-service
  project: payments
  feature: concurrency
  channel: ISO8583

  variables:
    pan: "4539148803436467"
    amount_paise: "000000300000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "356"
    pos_entry_mode: "051"

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "{{pos_entry_mode}}"
      timeout_ms: 15000
      capture_response_as: auth_response

    - type: assert
      expression: "auth_response['field39'] == '00'"
      description: "Auth must be approved first"
      fail_fast: true

    - type: send
      channel: ISO8583
      operation: reversal_request_0400
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        rrn: "{{auth_response['rrn']}}"
      timeout_ms: 15000
      capture_response_as: reversal_response

    - type: assert
      expression: "reversal_response['field39'] == '00'"
      description: "Reversal must succeed immediately after auth"
      fail_fast: true
