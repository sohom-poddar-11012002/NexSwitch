scenario:
  id: expired-card
  name: "Expired card — past expiry date"
  description: "Auth with expiry date in the past. Expects field39=54 (expired card)."
  platform: acquiring-service
  project: payments
  feature: boundary
  channel: ISO8583

  variables:
    pan: "4539148803436467"
    amount_paise: "000000100000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "356"
    pos_entry_mode: "051"

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "{{pos_entry_mode}}"
        field_14: "2001"
      timeout_ms: 10000
      capture_response_as: auth_response

    - type: assert
      expression: "auth_response['field39'] == '54'"
      description: "Expired card must return code 54"
      fail_fast: true
