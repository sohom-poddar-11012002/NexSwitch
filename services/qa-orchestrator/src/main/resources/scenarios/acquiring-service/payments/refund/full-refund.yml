scenario:
  id: full-refund
  name: "Full refund — authorized transaction refunded in full"
  description: >
    Authorises ₹2,000 via ISO 8583, then issues a full refund via REST.
    Status must transition AUTHORIZED → REFUND_INITIATED.
  platform: acquiring-service
  project: payments
  feature: refund
  channel: MULTI

  variables:
    pan: "4539148803436467"
    amount_paise: "000000200000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "356"
    pos_entry_mode: "051"

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "{{pos_entry_mode}}"
      timeout_ms: 15000
      capture_response_as: auth_response

    - type: assert
      expression: "auth_response['field39'] == '00'"
      description: "Auth must be approved"
      fail_fast: true

    - type: inject_variable
      name: txn_id
      value: "{{auth_response['transaction_id']}}"

    - type: send
      channel: REST
      operation: POST /api/v1/refunds
      payload:
        transaction_id: "{{txn_id}}"
        refund_amount_paise: "{{amount_paise}}"
        reason: "customer_request"
      timeout_ms: 5000
      capture_response_as: refund_response

    - type: assert
      expression: "refund_response['status'] == 'REFUND_INITIATED'"
      description: "Refund must be initiated successfully"
      fail_fast: true
