scenario:
  id: mastercard-auth-approved
  name: "Mastercard approval"
  description: "Mastercard PAN (BIN 52), contactless NFC, ₹1,200. Expects field39=00."
  platform: acquiring-service
  project: payments
  feature: authorization
  channel: ISO8583

  variables:
    pan: "5200828282828210"
    amount_paise: "000000120000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "356"
    pos_entry_mode: "071"     # Contactless EMV

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "{{pos_entry_mode}}"
      timeout_ms: 15000
      capture_response_as: auth_response

    - type: assert
      expression: "auth_response['field39'] == '00'"
      description: "Mastercard approval — field39 must be 00"
      fail_fast: true
