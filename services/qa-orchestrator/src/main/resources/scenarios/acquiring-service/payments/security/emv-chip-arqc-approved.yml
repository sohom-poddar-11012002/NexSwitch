scenario:
  id: emv-chip-arqc-approved
  name: "EMV chip ARQC verified — ARPC returned"
  description: |
    Full EMV chip authorization round-trip. Field 55 carries minimal BER-TLV:
      Tag 9F26 (ARQC, 8 bytes) — Application Request Cryptogram from the chip
      Tag 9F36 (ATC, 2 bytes)  — Application Transaction Counter = 1
    MockHsm.verifyArqc returns true; generateArpc returns 8 zero bytes.
    The 0110 response must include Field 91 (Issuer Authentication Data / ARPC).
    With SoftHSM2 (staging), the real EMV Option A 3DES-CBC-MAC runs against payments-imk.
  platform: acquiring-service
  project: payments
  feature: security
  channel: ISO8583

  variables:
    pan: "4539148803436467"
    amount_paise: "000000150000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "356"
    pos_entry_mode: "051"
    # Minimal BER-TLV: 9F26 (ARQC=0102030405060708) + 9F36 (ATC=0001)
    # Bytes: 9F 26 08 01 02 03 04 05 06 07 08  9F 36 02 00 01
    emv_data_hex: "9F260801020304050607089F36020001"

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "{{pos_entry_mode}}"
        emv_data_hex: "{{emv_data_hex}}"
      timeout_ms: 15000
      capture_response_as: auth_response

    - type: assert
      expression: "auth_response['field39'] == '00'"
      description: "EMV chip with ARQC must be approved (00)"
      fail_fast: true

    - type: assert
      expression: "auth_response['field91_hex'] != null"
      description: "Field 91 (ARPC) must be present in 0110 response for chip transactions"
      fail_fast: true

    - type: assert
      expression: "auth_response['field91_hex'].length() == 16"
      description: "ARPC must be exactly 8 bytes (16 hex chars)"
      fail_fast: false
