scenario:
  id: emv-chip-arqc-invalid
  name: "EMV chip ARQC tampered — staging rejection"
  description: |
    Tampered ARQC: last byte of Tag 9F26 flipped (08 → FF). The chip cryptogram is invalid.
    MockHsm (CI): verifyArqc always returns true → field39=00 (mock cannot detect forgery).
    SoftHSM2 (staging): re-derives CSK from payments-imk + ATC, recomputes expected ARQC,
      comparison fails → AuthorizationService returns Declined(82) → field39=82.
    This scenario is meaningful only on staging with hsm.provider=softhsm and payments-imk loaded.
    CI asserts RC=00 (mock pass-through) to keep the build green while validating the parse path.
  platform: acquiring-service
  project: payments
  feature: security
  channel: ISO8583

  variables:
    pan: "4539148803436467"
    amount_paise: "000000150000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "356"
    pos_entry_mode: "051"
    # Same TLV as emv-chip-arqc-approved but last byte of ARQC changed 08 → FF (tampered)
    # Bytes: 9F 26 08 01 02 03 04 05 06 07 FF  9F 36 02 00 01
    emv_data_hex: "9F2608010203040506 07FF9F36020001"

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "{{pos_entry_mode}}"
        emv_data_hex: "{{emv_data_hex}}"
      timeout_ms: 15000
      capture_response_as: auth_response

    # CI (mock HSM): mock always approves — test validates F55 parse path, not crypto
    - type: assert
      expression: "auth_response['field39'] == '00' || auth_response['field39'] == '82'"
      description: "Mock CI: 00 (mock approves). Staging: 82 (ARQC mismatch rejected)"
      fail_fast: true
