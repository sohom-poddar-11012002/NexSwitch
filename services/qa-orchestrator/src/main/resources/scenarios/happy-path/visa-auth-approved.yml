scenario:
  id: visa-auth-approved
  name: "Visa chip+PIN approval"
  description: "Golden path — Visa PAN, valid Luhn, sufficient funds. Expects field39=00."
  category: happy-path
  channel: ISO8583

  variables:
    pan: "4539148803436467"
    amount_paise: "000000600000"
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"
    currency: "356"
    pos_entry_mode: "051"

  steps:
    - type: inject_variable
      name: stan
      value: "{{$stan}}"

    - type: send
      channel: ISO8583
      operation: auth_request_0100
      payload:
        pan: "{{pan}}"
        stan: "{{stan}}"
        amount_paise: "{{amount_paise}}"
        terminal_id: "{{terminal_id}}"
        merchant_id: "{{merchant_id}}"
        currency: "{{currency}}"
        pos_entry_mode: "{{pos_entry_mode}}"
      timeout_ms: 15000
      capture_response_as: auth_response

    - type: assert
      expression: "auth_response['field39'] == '00'"
      description: "Response code must be approved (00)"
      fail_fast: true

    - type: wait_for_human
      step_id: verify-receipt
      instruction: "Check receipt printed on terminal — verify merchant name, amount ₹6,000.00, and approval code are present. Then click Continue."
      timeout_ms: 120000
