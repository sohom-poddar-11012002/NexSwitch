run:
  id: golden-path-run
  name: "Golden path — all happy path scenarios"
  description: "Runs Visa, RuPay, Mastercard approvals sequentially. Each scenario's captured variables flow to the next."

  variables:
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"

  scenarios:
