run:
  id: golden-path-run
  name: "Golden path — authorization happy path"
  description: "Runs Visa, RuPay, Mastercard approvals sequentially. STATEFUL so captured responses flow forward."

  session:
    mode: STATEFUL
    isolate_on_failure: true

  variables:
    terminal_id: "TERM0042"
    merchant_id: "MERCH0000999"

  scenarios:
    - id: visa-auth-approved
    - id: rupay-auth-approved
    - id: mastercard-auth-approved
    - id: amex-auth-approved
    - id: diners-auth-approved
    - id: emv-chip-arqc-approved
    - id: chip-pin-dukpt-approved
