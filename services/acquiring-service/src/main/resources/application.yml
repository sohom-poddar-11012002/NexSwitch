spring:
  application:
    name: acquiring-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nexswitch}
    username: ${DB_USERNAME:nexswitch_app}
    password: ${DB_PASSWORD:local_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 2000
      # LEARN: idle-timeout evicts connections idle longer than 10 min; max-lifetime
      #        recycles before the server's wait_timeout kills them from under HikariCP.
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true   # acquiring-service is the SOLE Flyway owner
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:local_dev_password}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read_committed
      max-poll-records: 100
      properties:
        # LEARN: max.poll.interval.ms — Kafka evicts a consumer if it doesn't call
        #        poll() within this window. Set well above the slowest message handler
        #        (300s covers DB writes + HSM calls under load).
        max.poll.interval.ms: 300000

  servlet:
    multipart:
      max-file-size: 256KB
      max-request-size: 256KB

server:
  port: 8080
  # LEARN: Unbounded POST bodies are an OOM vector — a 100MB payload can exhaust the heap
  #        before any validation fires. Cap at 256KB: well above any valid payment request.
  tomcat:
    max-http-form-post-size: 262144   # 256 KB
  # LEARN: graceful shutdown drains in-flight requests before the JVM exits;
  #        combined with SIGTERM→PID1 in the Dockerfile this means zero dropped
  #        transactions on a rolling pod restart.
  shutdown: graceful

cors:
  allowed-origins: >
    ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003}

npci:
  callback:
    api-key: ${NPCI_CALLBACK_API_KEY:}  # blank = check skipped (dev); set in prod/staging

iso8583:
  port: 8000

upstream:
  provider: ${UPSTREAM_PROVIDER:wiremock}

hsm:
  provider: ${HSM_PROVIDER:mock}
  pkcs11:
    library: ${HSM_LIBRARY:/usr/lib/softhsm/libsofthsm2.so}
    slot: ${HSM_SLOT:0}
    pin: ${HSM_PIN:1234}
    bdk-alias: payments-bdk
    zpk-alias: payments-zpk
    mak-alias: payments-mak

storage:
  provider: ${STORAGE_PROVIDER:local}

qr:
  session:
    ttl-minutes: 5

resilience4j:
  retry:
    instances:
      networkAuth:
        # LEARN: maxAttempts=2 means one initial try + one retry — avoids hammering a
        #        struggling upstream while still recovering from transient TCP timeouts.
        maxAttempts: 2
        waitDuration: 200ms
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  circuitbreaker:
    instances:
      hsm:
        # LEARN: slidingWindowType COUNT_BASED uses the last N calls (not time-based) —
        #        avoids false trips during low-traffic periods where 1 failure = 100%.
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        # LEARN: 25% threshold — 50% was too permissive for HSM; one bad batch of 5/10
        #        calls should open the circuit, not 50/100. Industry standard for payments
        #        hardware is 20–30%.
        failureRateThreshold: 25
        # slowCallDurationThreshold marks HSM calls >500ms as "slow" — treated as failures
        slowCallDurationThreshold: 500ms
        slowCallRateThreshold: 80
        # LEARN: 10s open state for HSM — 30s meant 30s of failed authorizations; 10s
        #        allows faster recovery while still giving the HSM time to stabilise.
        waitDurationInOpenState: 10s
        # LEARN: half-open probe — only 3 test calls allowed before circuit decides to
        #        close or re-open; prevents re-triggering the open state on recovery.
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      network:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 25
        slowCallDurationThreshold: 15s
        slowCallRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  bulkhead:
    instances:
      hsm:
        # Max concurrent HSM sessions — HSM hardware has a fixed session pool
        maxConcurrentCalls: 10
        maxWaitDuration: 100ms
      network:
        # Max concurrent upstream auth calls — protects the Netty thread pool
        maxConcurrentCalls: 50
        maxWaitDuration: 500ms

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,hsmHealthIndicator,kafkaCustomHealthIndicator
