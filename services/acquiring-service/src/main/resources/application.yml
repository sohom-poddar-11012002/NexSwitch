spring:
  application:
    name: acquiring-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nexswitch}
    username: ${DB_USERNAME:nexswitch_app}
    password: ${DB_PASSWORD:local_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 2000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true   # acquiring-service is the SOLE Flyway owner
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:local_dev_password}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      enable-idempotence: true
      compression-type: snappy
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read_committed

  security:
    enabled: false   # disabled during skeleton phase

server:
  port: 8080

iso8583:
  port: 8000

upstream:
  provider: ${UPSTREAM_PROVIDER:wiremock}

hsm:
  provider: ${HSM_PROVIDER:mock}
  pkcs11:
    library: ${HSM_LIBRARY:/usr/lib/softhsm/libsofthsm2.so}
    slot: ${HSM_SLOT:0}
    pin: ${HSM_PIN:1234}
    bdk-alias: payments-bdk
    zpk-alias: payments-zpk
    mak-alias: payments-mak

storage:
  provider: ${STORAGE_PROVIDER:local}

qr:
  session:
    ttl-minutes: 5

resilience4j:
  circuitbreaker:
    instances:
      hsm:
        # LEARN: slidingWindowType COUNT_BASED uses the last N calls (not time-based) —
        #        avoids false trips during low-traffic periods where 1 failure = 100%.
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        # slowCallDurationThreshold marks HSM calls >500ms as "slow" — treated as failures
        slowCallDurationThreshold: 500ms
        slowCallRateThreshold: 80
        waitDurationInOpenState: 30s
        # LEARN: half-open probe — only 3 test calls allowed before circuit decides to
        #        close or re-open; prevents re-triggering the open state on recovery.
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      network:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        slowCallDurationThreshold: 15s
        slowCallRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  bulkhead:
    instances:
      hsm:
        # Max concurrent HSM sessions — HSM hardware has a fixed session pool
        maxConcurrentCalls: 10
        maxWaitDuration: 100ms
      network:
        # Max concurrent upstream auth calls — protects the Netty thread pool
        maxConcurrentCalls: 50
        maxWaitDuration: 500ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis
